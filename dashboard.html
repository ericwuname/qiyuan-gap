<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>启元智能 · 外部大脑 · 监控看板 V2.1</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
h1 { font-size: 24px; margin-bottom: 4px; }
.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.card h2 { font-size: 16px; margin-bottom: 12px; color: #94a3b8; }
.stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
.stat-row:last-child { border-bottom: none; }
.stat-value { font-weight: 600; }
.green { color: #22c55e; }
.yellow { color: #eab308; }
.red { color: #ef4444; }
.bar-container { background: #334155; border-radius: 6px; height: 20px; margin: 2px 0; overflow: hidden; }
.bar { height: 100%; border-radius: 6px; transition: width 0.5s; }
table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
th { text-align: left; padding: 8px 6px; border-bottom: 2px solid #334155; color: #94a3b8; font-weight: 500; cursor: pointer; }
th:hover { color: #e2e8f0; }
td { padding: 8px 6px; border-bottom: 1px solid #334155; }
td.dormant { color: #ef4444; }
td.active { color: #22c55e; }
.metric-big { font-size: 36px; font-weight: 700; }
.refresh { float: right; background: #334155; border: none; color: #e2e8f0; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
.refresh:hover { background: #475569; }
.tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
.tab.active { background: #334155; color: #e2e8f0; border-color: #475569; }
.filter-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-bar input, .filter-bar select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
.filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: #475569; }
.filter-bar input { flex: 1; min-width: 150px; }
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 120px; padding: 4px 0; }
.bar-chart .bar-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
.bar-chart .bar-item .bar-fill { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.5s; min-height: 2px; }
.bar-chart .bar-item .bar-label { font-size: 10px; color: #94a3b8; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; }
.bar-chart .bar-item .bar-value { font-size: 10px; color: #e2e8f0; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-active { background: #22c55e20; color: #22c55e; }
.badge-dormant { background: #ef444420; color: #ef4444; }
.dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
.dot.green { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
.dot.yellow { background: #ff9800; box-shadow: 0 0 8px #ff9800; animation: pulse 2s infinite; }
.dot.red { background: #f44336; box-shadow: 0 0 8px #f44336; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

/* Value Dashboard: two-column overview layout */
.overview-layout { display: flex; gap: 24px; margin-bottom: 24px; }
.overview-tech { flex: 1; min-width: 0; }
.overview-value { flex: 1; min-width: 0; }
@media (max-width: 768px) {
  .overview-layout { flex-direction: column; }
}
.value-card { background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.value-card h2 { font-size: 16px; margin-bottom: 16px; color: #94a3b8; }
.value-metric { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
.value-metric:last-child { border-bottom: none; }
.value-metric-label { font-size: 13px; color: #94a3b8; flex: 1; }
.value-metric-main { display: flex; align-items: center; gap: 8px; }
.value-metric-num { font-size: 18px; font-weight: 700; }
.value-metric-sub { font-size: 12px; color: #64748b; margin-left: 4px; }
.trend-up { color: #22c55e; font-size: 14px; }
.trend-down { color: #ef4444; font-size: 14px; }
.trend-flat { color: #94a3b8; font-size: 14px; }
.value-placeholder { color: #64748b; font-style: italic; font-size: 13px; padding: 12px 0; }
</style>
</head>
<body>

<div style="display:flex;align-items:center;gap:16px;margin-bottom:8px;">
<span id="health-dot" class="dot green"></span>
<span id="auto-refresh-status" style="font-size:12px;color:#888;">Live · 30s refresh</span>
<span id="evolve-status" style="font-size:12px;color:#666;margin-left:12px;"></span>
</div>
<h1>启元智能 · 外部大脑</h1>
<p class="subtitle">监控看板 V2.1 · 价值仪表盘 + 技术面板 · 自动刷新 30s</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('overview')">总览</button>
  <button class="tab" onclick="switchTab('rules')">规则统计 · P0-1</button>
  <button class="tab" onclick="switchTab('performance')">性能</button>
</div>

<!-- Overview Tab: two-column layout -->
<div id="overview" class="tab-content">
  <div class="overview-layout">
    <div class="overview-tech">
      <div class="grid" id="overview-grid"></div>
    </div>
    <div class="overview-value">
      <div id="value-dashboard"></div>
    </div>
  </div>
</div>

<!-- Rules Tab (P0-1 enhanced) -->
<div id="rules" class="tab-content" style="display:none">
  <div class="card">
    <h2>规则使用统计 · P0-1 增强版</h2>
    <div class="grid" id="rules-summary"></div>
    <div class="filter-bar">
      <input type="text" id="rule-filter" placeholder="搜索规则ID/名称..." oninput="renderRulesTable()">
      <select id="status-filter" onchange="renderRulesTable()">
        <option value="all">全部 (活跃+休眠)</option>
        <option value="active">仅活跃</option>
        <option value="dormant">仅休眠</option>
      </select>
      <select id="sort-filter" onchange="renderRulesTable()">
        <option value="calls">按调用次数</option>
        <option value="id">按规则ID</option>
        <option value="level">按级别 (P0>P1>P2)</option>
      </select>
    </div>
    <div id="rules-bar-chart" class="bar-chart" style="margin-bottom:16px;"></div>
    <table id="rules-table">
      <thead>
        <tr>
          <th onclick="document.getElementById('sort-filter').value='id';renderRulesTable()">规则ID</th>
          <th>名称</th>
          <th onclick="document.getElementById('sort-filter').value='level';renderRulesTable()">级别</th>
          <th onclick="document.getElementById('sort-filter').value='calls';renderRulesTable()">调用次数</th>
          <th>命中率</th>
          <th>最后使用</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Performance Tab -->
<div id="performance" class="tab-content" style="display:none">
  <div class="grid" id="perf-grid"></div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.tab-content').forEach(function(c){ c.style.display = 'none'; });
  var target = document.getElementById(tab);
  if (target) target.style.display = '';
  var btns = document.querySelectorAll('.tab');
  for (var i=0; i<btns.length; i++) {
    if (btns[i].getAttribute('onclick') && btns[i].getAttribute('onclick').indexOf(tab)>=0) {
      btns[i].classList.add('active');
    }
  }
}

// Tech Overview
function renderOverview(status) {
  var grid = document.getElementById('overview-grid');
  var badge = status.brain_ok ? '<span class="badge badge-active">在线</span>' : '<span class="badge badge-dormant">离线</span>';
  var rulesOk = status.components && status.components.rules && status.components.rules.ok;
  var memoryOk = status.components && status.components.memory && status.components.memory.ok;
  var auditOk = status.components && status.components.audit && status.components.audit.ok;
  grid.innerHTML =
    '<div class="card">' +
    '<h2>大脑状态 ' + badge + '</h2>' +
    '<div class="stat-row"><span>版本</span><span class="stat-value">' + (status.version||'N/A') + '</span></div>' +
    '<div class="stat-row"><span>规则引擎</span><span class="stat-value ' + (rulesOk?'green':'red') + '">' + (rulesOk?'正常':'异常') + '</span></div>' +
    '<div class="stat-row"><span>记忆体</span><span class="stat-value ' + (memoryOk?'green':'red') + '">' + (memoryOk?'正常':'异常') + '</span></div>' +
    '<div class="stat-row"><span>审计</span><span class="stat-value ' + (auditOk?'green':'red') + '">' + (auditOk?'正常':'异常') + '</span></div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>记忆体</h2>' +
    '<div class="stat-row"><span>已索引文档</span><span class="stat-value">' + ((status.components && status.components.memory && status.components.memory.indexed_docs)||0) + '</span></div>' +
    '<div class="stat-row"><span>模型</span><span class="stat-value green">' + ((status.components && status.components.memory && status.components.memory.model)||'N/A') + '</span></div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>审计日志</h2>' +
    '<div class="stat-row"><span>总记录数</span><span class="stat-value">' + ((status.components && status.components.audit && status.components.audit.total_logs)||0) + '</span></div>' +
    '<div class="stat-row"><span>数据库大小</span><span class="stat-value">' + ((status.components && status.components.audit && status.components.audit.db_size_kb)||0) + ' KB</span></div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>自愈</h2>' +
    '<div class="stat-row"><span>降级级别</span><span class="stat-value ' + (((status.components && status.components.self_heal && status.components.self_heal.degrade_level)||0)===0?'green':'yellow') + '">Level ' + ((status.components && status.components.self_heal && status.components.self_heal.degrade_level)||0) + '</span></div>' +
    '<div class="card" id="wm-panel">' +
    '<h2>World Model</h2>' +
    '<div class="stat-row"><span>状态</span><span id="wm-status-text" class="stat-value yellow">—</span></div>' +
    '<div class="stat-row"><span>Surprise Avg</span><span id="wm-surprise" class="stat-value">—</span></div>' +
    '<div class="stat-row"><span>Step Count</span><span id="wm-step-count" class="stat-value">—</span></div>' +
    '</div>';
    '</div>';
}

// Value Dashboard
function renderValueDashboard(valueStats) {
  var container = document.getElementById('value-dashboard');
  if (!valueStats) {
    container.innerHTML =
      '<div class="value-card">' +
      '<h2>价值仪表盘</h2>' +
      '<p class="value-placeholder">数据采集中...</p>' +
      '<p class="value-placeholder" style="font-size:11px;">请确保 brain status --json 已启用 value_stats 输出</p>' +
      '</div>';
    return;
  }

  function trendArrow(val, reverse) {
    if (val === undefined || val === null || val === 0) return '<span class="trend-flat">—</span>';
    var up = val > 0;
    if (reverse) up = !up;
    return up ? '<span class="trend-up">▲ +' + val + '%</span>' : '<span class="trend-down">▼ ' + val + '%</span>';
  }
  function fmt(n) { return n != null ? Number(n).toLocaleString('zh-CN') : '—'; }
  function pct(n) { return n != null ? Number(n).toFixed(1) + '%' : '—'; }

  var weeklyCalls      = valueStats.weekly_rule_calls != null ? valueStats.weekly_rule_calls : null;
  var weeklyCallsTrend = valueStats.weekly_rule_calls_trend_pct != null ? valueStats.weekly_rule_calls_trend_pct : null;
  var weeklyKbSearch   = valueStats.weekly_kb_searches != null ? valueStats.weekly_kb_searches : null;
  var kbHitRate        = valueStats.kb_hit_rate_pct != null ? valueStats.kb_hit_rate_pct : null;
  var totalSavedMin    = valueStats.total_saved_minutes != null ? valueStats.total_saved_minutes : null;
  var evolvedRules     = valueStats.auto_evolve_active_rules != null ? valueStats.auto_evolve_active_rules : null;
  var uptimePct        = valueStats.uptime_pct != null ? valueStats.uptime_pct : null;
  var activeUsers      = valueStats.weekly_active_users != null ? valueStats.weekly_active_users : null;
  var adoptionAsk      = valueStats.adoption_ask_pct != null ? valueStats.adoption_ask_pct : null;
  var adoptionChat     = valueStats.adoption_chat_pct != null ? valueStats.adoption_chat_pct : null;
  var adoptionQuick    = valueStats.adoption_quick_pct != null ? valueStats.adoption_quick_pct : null;

  var adoptionStr = '';
  if (adoptionAsk != null || adoptionChat != null || adoptionQuick != null) {
    var parts = [];
    if (adoptionAsk != null)   parts.push('ask ' + pct(adoptionAsk));
    if (adoptionChat != null)  parts.push('chat ' + pct(adoptionChat));
    if (adoptionQuick != null) parts.push('quick ' + pct(adoptionQuick));
    adoptionStr = parts.join(' / ');
  }

  container.innerHTML =
    '<div class="value-card">' +
    '<h2>价值仪表盘</h2>' +

    // 1. 本周规则调用次数 + trend
    '<div class="value-metric">' +
    '<span class="value-metric-label">本周规则调用次数</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num ' + (weeklyCalls!=null && weeklyCalls>0?'green':'yellow') + '">' + fmt(weeklyCalls) + '</span>' +
    trendArrow(weeklyCallsTrend) +
    '</div></div>' +

    // 2. 本周知识库检索次数 + 命中率
    '<div class="value-metric">' +
    '<span class="value-metric-label">本周知识库检索次数</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num">' + fmt(weeklyKbSearch) + '</span>' +
    '<span class="value-metric-sub">命中率 ' + pct(kbHitRate) + '</span>' +
    '</div></div>' +

    // 3. 累计节省手动操作时长
    '<div class="value-metric">' +
    '<span class="value-metric-label">累计节省手动操作时长</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num ' + (totalSavedMin!=null && totalSavedMin>60?'green':'yellow') + '">' + fmt(totalSavedMin) + ' 分钟</span>' +
    '</div></div>' +

    // 4. 自进化贡献规则数
    '<div class="value-metric">' +
    '<span class="value-metric-label">自进化贡献规则数</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num ' + (evolvedRules!=null && evolvedRules>0?'green':'yellow') + '">' + fmt(evolvedRules) + '</span>' +
    '</div></div>' +

    // 5. 系统可用率
    '<div class="value-metric">' +
    '<span class="value-metric-label">系统可用率</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num ' + (uptimePct!=null && uptimePct>=99?'green':uptimePct!=null && uptimePct>=95?'yellow':'red') + '">' + pct(uptimePct) + '</span>' +
    '</div></div>' +

    // 6. 本周活跃用户数
    '<div class="value-metric">' +
    '<span class="value-metric-label">本周活跃用户数</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num ' + (activeUsers!=null && activeUsers>0?'green':'yellow') + '">' + fmt(activeUsers) + '</span>' +
    '</div></div>' +

    // 7. 新功能采纳率
    '<div class="value-metric">' +
    '<span class="value-metric-label">新功能采纳率</span>' +
    '<div class="value-metric-main">' +
    '<span class="value-metric-num" style="font-size:13px;font-weight:500;">' + (adoptionStr || '—') + '</span>' +
    '</div></div>' +

    '</div>';
}

// Rules rendering
var _rulesData = null;
function renderRules(data) {
  _rulesData = data;
  var summary = document.getElementById('rules-summary');
  summary.innerHTML =
    '<div class="card"><h2>规则总数</h2><div class="metric-big green">' + (data.total_rules||0) + '</div></div>' +
    '<div class="card"><h2>活跃规则</h2><div class="metric-big green">' + (data.active_rules||0) + '</div></div>' +
    '<div class="card"><h2>休眠规则</h2><div class="metric-big yellow">' + (data.inactive_rules||0) + '</div></div>' +
    '<div class="card"><h2>总调用次数</h2><div class="metric-big">' + (data.total_calls||0) + '</div></div>';
  renderRulesBarChart();
  renderRulesTable();
}

function renderRulesBarChart() {
  var container = document.getElementById('rules-bar-chart');
  if (!_rulesData || !_rulesData.rules || _rulesData.rules.length === 0) {
    container.innerHTML = '<span style="color:#94a3b8;font-size:12px">暂无调用数据</span>'; return;
  }
  var top = _rulesData.rules.filter(function(r){return r.call_count>0}).slice(0, 10);
  if (top.length === 0) {
    container.innerHTML = '<span style="color:#94a3b8;font-size:12px">暂无调用数据</span>'; return;
  }
  var maxVal = Math.max.apply(null, top.map(function(r){return r.call_count}), 1);
  container.innerHTML = top.map(function(r){
    return '<div class="bar-item" title="' + r.id + ' ' + r.name + ': ' + r.call_count + '次">' +
      '<div class="bar-fill" style="height:' + (r.call_count/maxVal*100) + '%;background:' + (r.call_count>0?'#22c55e':'#334155') + '"></div>' +
      '<div class="bar-value">' + r.call_count + '</div>' +
      '<div class="bar-label">' + r.id + '</div>' +
      '</div>';
  }).join('');
}

function renderRulesTable() {
  if (!_rulesData || !_rulesData.rules) return;
  var filter = (document.getElementById('rule-filter').value || '').toLowerCase();
  var status = document.getElementById('status-filter').value;
  var sort = document.getElementById('sort-filter').value;

  var rules = _rulesData.rules.slice();

  if (filter) rules = rules.filter(function(r){return r.id.toLowerCase().indexOf(filter)>=0 || r.name.toLowerCase().indexOf(filter)>=0});
  if (status === 'active') rules = rules.filter(function(r){return r.call_count > 0});
  if (status === 'dormant') rules = rules.filter(function(r){return r.call_count === 0});

  if (sort === 'calls') rules.sort(function(a,b){return b.call_count - a.call_count});
  if (sort === 'id') rules.sort(function(a,b){return a.id.localeCompare(b.id)});
  if (sort === 'level') rules.sort(function(a,b){return (a.level||'P2').localeCompare(b.level||'P2')});

  document.querySelector('#rules-table tbody').innerHTML = rules.map(function(r){
    var isDormant = r.call_count === 0;
    return '<tr>' +
      '<td>' + r.id + '</td>' +
      '<td>' + r.name + '</td>' +
      '<td>' + (r.level||'P2') + '</td>' +
      '<td>' + r.call_count + '</td>' +
      '<td>' + (r.call_count>0 ? (100-r.miss_rate_pct).toFixed(0)+'%' : '-') + '</td>' +
      '<td class="' + (isDormant?'dormant':'active') + '">' + (r.last_used||'never') + '</td>' +
      '<td><span class="badge ' + (isDormant?'badge-dormant':'badge-active') + '">' + (isDormant?'休眠':'活跃') + '</span></td>' +
      '</tr>';
  }).join('');
}

var _perfData = null;
function renderPerformance(data) {
  _perfData = data;
  var grid = document.getElementById('perf-grid');
  if (!data) {
    grid.innerHTML = '<div class="card"><h2>性能</h2><p class="yellow">暂无 (运行 brain perf)</p></div>';
    return;
  }
  var ruleP99 = (data.rule_check && data.rule_check.p99_ms) || 0;
  var kbP99 = (data.kb_search && data.kb_search.p99_ms) || 0;
  grid.innerHTML =
    '<div class="card">' +
    '<h2>规则检查 P99</h2>' +
    '<div class="metric-big ' + (ruleP99<=200?'green':'yellow') + '">' + ruleP99 + ' ms</div>' +
    '<div class="bar-container"><div class="bar" style="width:' + Math.min(ruleP99/200*100,100) + '%;background:' + (ruleP99<=200?'#22c55e':'#eab308') + '"></div></div>' +
    '</div>' +
    '<div class="card">' +
    '<h2>知识库搜索 P99</h2>' +
    '<div class="metric-big ' + (kbP99<=1000?'green':'yellow') + '">' + kbP99 + ' ms</div>' +
    '<div class="bar-container"><div class="bar" style="width:' + Math.min(kbP99/1000*100,100) + '%;background:' + (kbP99<=1000?'#22c55e':'#eab308') + '"></div></div>' +
    '</div>';
}

// World Model panel
function renderWM(wm) {
  var statusEl = document.getElementById('wm-status-text');
  var surpriseEl = document.getElementById('wm-surprise');
  var stepEl = document.getElementById('wm-step-count');
  if (statusEl) {
    statusEl.textContent = wm.status || '—';
    statusEl.className = 'stat-value ' + (wm.status === 'normal' ? 'green' : wm.status === 'cold_start' ? 'yellow' : 'red');
  }
  if (surpriseEl) surpriseEl.textContent = wm.surprise_avg != null ? Number(wm.surprise_avg).toFixed(4) : '—';
  if (stepEl) stepEl.textContent = wm.step_count != null ? wm.step_count : '—';
}
