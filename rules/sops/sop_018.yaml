
- id: SOP-018
  name: 数据保护与删除安全
  priority: 10
  triggers:
  - 删除
  - 清理
  - Remove-Item
  - del
  - rm
  - 整理
  - 清空
  action: |
    执行任何删除/清理前必须：
    1. 检查目标路径是否在允许操作的白名单内
    2. 白名单路径仅限：D:\\0.个人文档\\个人文档\\启元智能\\
    3. 禁止使用 ..\\ 相对路径
    4. 禁止使用通配符 * 配合 -Recurse -Force
    5. 禁用 -Force 参数（防止跳过回收站）
    6. 删除前向CEO报告：删什么、为什么、大小、能否恢复
    7. 获得CEO确认后执行
    8. 删除后报告：已删路径、文件数、总大小
    9. 记录完整操作日志
  level: S+
  owner: system
  status: active
  created: '2026-06-22'
